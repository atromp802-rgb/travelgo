            <div class="col-md-6 bg-white p-5 shadow rounded">
                <h2 class="text-center mb-4 text-primary">Solicitar Información</h2>
                <form>
                    <div class="mb-3">
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" class="form-control" placeholder="Escribe tu nombre" required>
                    </div>
                    <div class="mb-3">

                        <input type="email" class="form-control" placeholder="nombre@correo.com" required>

                            <option>China</option>
                            <option>Rusia</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mensaje o Dudas</label>
                        <textarea class="form-control" rows="4"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 shadow">Enviar Solicitud</button>
                </form>
            </div>
        </div>
    </div>
